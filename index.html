<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Speed Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0a0e12;
  --surface: #111820;
  --border: rgba(0,210,170,0.15);
  --accent: #00d2aa;
  --accent2: #00aaff;
  --text: #e0ede9;
  --muted: #5a7a72;
  --danger: #ff5f5f;
  --warn: #ffb347;
  --grid: rgba(0,210,170,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }

.shell { display: flex; flex-direction: column; height: 100vh; padding: 10px 12px; gap: 8px; }

header { display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-shrink: 0; }
header h1 { font-size: 12px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; font-weight: normal; }
#status-text { font-size: 11px; color: var(--muted); }
#status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 6px; }
#status-dot.running { background: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.ip-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 8px 14px; display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
.ip-field { display: flex; flex-direction: column; gap: 1px; }
.ip-field .lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
.ip-field .val { font-size: 12px; color: var(--text); }
#ip-addr { font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 0.05em; transition: color 0.3s; }
#ip-addr.changed { color: var(--warn); animation: flaship 1.5s; }
@keyframes flaship { 0%,100%{opacity:1} 30%{opacity:0.15} }
.ip-sep { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }
#ip-status { font-size: 9px; color: var(--muted); margin-left: auto; }

.main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 1; min-height: 0; }

@media (max-width: 820px) {
  .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  .right { max-height: 130px; }
  #speed-value { font-size: 52px !important; }
  .big-speed { padding: 10px 0 8px !important; }
  header h1 { font-size: 11px; }
  .ip-bar { padding: 6px 10px; gap: 12px; }
  #ip-addr { font-size: 13px; }
}

.left { display: flex; flex-direction: column; gap: 8px; min-height: 0; }

.big-speed {
  background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden; flex-shrink: 0; padding: 16px 0 12px;
}
.big-speed::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 28px);
  pointer-events: none;
}
#speed-value { font-size: 72px; font-weight: bold; color: var(--accent); line-height: 1; transition: color 0.4s; position: relative; z-index: 1; }
#speed-unit { font-size: 14px; color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; position: relative; }
#speed-label { font-size: 9px; color: var(--muted); margin-top: 5px; letter-spacing: 0.2em; text-transform: uppercase; position: relative; }

.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; flex-shrink: 0; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 9px 12px; }
.card-label { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
.card-value { font-size: 22px; font-weight: bold; color: var(--accent); line-height: 1; }
.card-value.c2 { color: var(--accent2); }
.card-value.cw { color: var(--warn); }
.card-unit { font-size: 10px; color: var(--muted); margin-top: 3px; }

.controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
button {
  background: transparent; border: 1px solid var(--accent); color: var(--accent);
  font-family: 'Courier New', monospace; font-size: 11px; padding: 6px 12px; border-radius: 4px;
  cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.15s, color 0.15s;
}
button:hover { background: var(--accent); color: var(--bg); }
button.danger { border-color: var(--danger); color: var(--danger); }
button.danger:hover { background: var(--danger); color: var(--bg); }
button:disabled { opacity: 0.28; cursor: default; }
button:disabled:hover { background: transparent; color: var(--accent); }
select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Courier New', monospace; font-size: 11px; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
select option { background: var(--bg); }

.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 12px; flex: 1; min-height: 0; position: relative; }

.right { display: flex; flex-direction: column; min-height: 0; }
.log-header { font-size: 9px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; flex-shrink: 0; }
#log {
  background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
  padding: 10px 14px; font-size: 11px; flex: 1; overflow-y: auto;
  color: var(--muted); line-height: 1.95; min-height: 0;
}
#log .entry { display: flex; gap: 10px; }
#log .entry .ts { color: var(--accent); min-width: 72px; flex-shrink: 0; }
#log .entry .mark { color: var(--warn); }
#log::-webkit-scrollbar { width: 3px; }
#log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <h1><span id="status-dot"></span>VPN Speed Monitor</h1>
    <span id="status-text">остановлен</span>
  </header>

  <div class="ip-bar">
    <div class="ip-field">
      <div class="lbl">Публичный IP</div>
      <div id="ip-addr">—</div>
    </div>
    <div class="ip-sep"></div>
    <div class="ip-field">
      <div class="lbl">Страна</div>
      <div class="val" id="ip-country">—</div>
    </div>
    <div class="ip-sep"></div>
    <div class="ip-field">
      <div class="lbl">Провайдер / VPN</div>
      <div class="val" id="ip-org">—</div>
    </div>
    <div class="ip-sep"></div>
    <div class="ip-field">
      <div class="lbl">Город</div>
      <div class="val" id="ip-city">—</div>
    </div>
    <span id="ip-status">определение...</span>
  </div>

  <div class="main">

    <div class="left">
      <div class="big-speed">
        <div id="speed-value">—</div>
        <div id="speed-unit">Мбит/с</div>
        <div id="speed-label">скорость скачивания</div>
      </div>

      <div class="stats">
        <div class="card">
          <div class="card-label">Средняя (60с)</div>
          <div class="card-value c2" id="avg-val">—</div>
          <div class="card-unit">Мбит/с</div>
        </div>
        <div class="card">
          <div class="card-label">Максимум</div>
          <div class="card-value" id="max-val">—</div>
          <div class="card-unit">Мбит/с</div>
        </div>
        <div class="card">
          <div class="card-label">Скачано</div>
          <div class="card-value cw" id="samples-val">0</div>
          <div class="card-unit">МБ</div>
        </div>
      </div>

      <div class="controls">
        <button id="btn-start" onclick="startTest()">▶ Старт</button>
        <button id="btn-stop" onclick="stopTest()" class="danger" disabled>■ Стоп</button>
        <button onclick="resetStats()">↺ Сброс</button>
        <select id="chunk-size">
          <option value="5000000">5 МБ (рваный)</option>
          <option value="25000000">25 МБ</option>
          <option value="100000000" selected>100 МБ</option>
          <option value="500000000">500 МБ (плавный)</option>
          <option value="2000000000">2 ГБ (∞)</option>
        </select>
        <button onclick="logMarker()">⚑ Маркер</button>
      </div>

      <div class="chart-wrap">
        <canvas id="speedChart" role="img" aria-label="График скорости скачивания во времени"></canvas>
      </div>
    </div>

    <div class="right">
      <div class="log-header">Лог</div>
      <div id="log">
        <div class="entry" style="color:#2e4a44">// Старт → меняй сервер VPN → смотри IP и скорость</div>
      </div>
    </div>

  </div>
</div>

<script>
const MAX_POINTS = 120;
const STREAMS = 4;
const WINDOW_MS = 1500;
const WARMUP_MS = 2000;
const TICK_MS = 200;

let running = false;
let controllers = [];
let history = [], sampleCount = 0, maxSpeed = 0, markerNext = false;
let bytesLog = []; // { t, b } для sliding window
let tickTimer = null;
let totalBytes = 0;

const ctx = document.getElementById('speedChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { labels: [], datasets: [{ data: [], borderColor: '#00d2aa', backgroundColor: 'rgba(0,210,170,0.07)', borderWidth: 1.5, fill: true, tension: 0.35, pointRadius: 0, pointHoverRadius: 3 }] },
  options: {
    responsive: true, maintainAspectRatio: false, animation: { duration: 150 },
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.raw.toFixed(1) + ' Мбит/с' } } },
    scales: {
      x: { ticks: { color: '#5a7a72', font: { family: 'Courier New', size: 9 }, maxTicksLimit: 6, autoSkip: true }, grid: { color: 'rgba(0,210,170,0.05)' }, border: { color: 'rgba(0,210,170,0.12)' } },
      y: { min: 0, ticks: { color: '#5a7a72', font: { family: 'Courier New', size: 9 }, callback: v => v + ' М' }, grid: { color: 'rgba(0,210,170,0.05)' }, border: { color: 'rgba(0,210,170,0.12)' } }
    }
  }
});

function ts() { return new Date().toTimeString().slice(0,8); }

function addLog(msg, cls='') {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `<span class="ts">${ts()}</span><span class="${cls}">${msg}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function updateDisplay(mbps) {
  const el = document.getElementById('speed-value');
  el.textContent = mbps.toFixed(1);
  el.style.color = mbps < 5 ? '#ff5f5f' : mbps < 20 ? '#ffb347' : '#00d2aa';
  sampleCount++;
  if (mbps > maxSpeed) maxSpeed = mbps;
  history.push(mbps);
  if (history.length > MAX_POINTS) history.shift();
  const avg60 = history.slice(-60).reduce((a,b)=>a+b,0) / Math.min(history.length, 60);
  document.getElementById('avg-val').textContent = avg60.toFixed(1);
  document.getElementById('max-val').textContent = maxSpeed.toFixed(1);
  document.getElementById('samples-val').textContent = (totalBytes / 1e6).toFixed(0);
  chart.data.labels.push(ts());
  chart.data.datasets[0].data.push(parseFloat(mbps.toFixed(2)));
  if (chart.data.labels.length > MAX_POINTS) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
  if (markerNext) { addLog(`⚑ МАРКЕР | ${mbps.toFixed(1)} Мбит/с`, 'mark'); markerNext = false; }
  chart.update('none');
}

// Один бесконечный стрим — когда чанк кончается, сразу запускает новый
async function streamWorker(id) {
  const bytes = parseInt(document.getElementById('chunk-size').value);
  while (running) {
    const ac = new AbortController();
    controllers[id] = ac;
    try {
      const url = `https://speed.cloudflare.com/__down?bytes=${bytes}&r=${Date.now()}_${id}`;
      const res = await fetch(url, { signal: ac.signal, cache: 'no-store' });
      const reader = res.body.getReader();
      while (running) {
        const { done, value } = await reader.read();
        if (done) break;
        bytesLog.push({ t: performance.now(), b: value.length });
        totalBytes += value.length;
      }
      if (!running) { reader.cancel(); break; }
    } catch(e) {
      if (!running) break;
      await new Promise(r => setTimeout(r, 800));
    }
  }
}

// Тикер — каждые TICK_MS считает скорость по sliding window
function startTicker(startTime) {
  tickTimer = setInterval(() => {
    if (!running) return;
    const now = performance.now();
    const warmup = now - startTime < WARMUP_MS;

    // убираем старые записи за пределами окна
    const cutoff = now - WINDOW_MS;
    while (bytesLog.length && bytesLog[0].t < cutoff) bytesLog.shift();

    if (warmup || bytesLog.length < 2) {
      document.getElementById('speed-value').textContent = '…';
      document.getElementById('speed-value').style.color = '#5a7a72';
      document.getElementById('status-text').textContent = 'разгон TCP...';
      return;
    }

    document.getElementById('status-text').textContent = 'измерение...';
    const totalBytes = bytesLog.reduce((s, e) => s + e.b, 0);
    const windowSec = (now - bytesLog[0].t) / 1000;
    const mbps = (totalBytes * 8) / (windowSec * 1e6);
    updateDisplay(mbps);
  }, TICK_MS);
}

function startTest() {
  if (running) return;
  running = true;
  bytesLog = [];
  totalBytes = 0;
  controllers = new Array(STREAMS);
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('status-dot').className = 'running';
  document.getElementById('status-text').textContent = 'разгон TCP...';
  addLog(`запуск ${STREAMS} параллельных потоков`);
  const startTime = performance.now();
  for (let i = 0; i < STREAMS; i++) streamWorker(i);
  startTicker(startTime);
}

function stopTest() {
  running = false;
  clearInterval(tickTimer);
  controllers.forEach(ac => { try { ac.abort(); } catch(e){} });
  controllers = [];
  bytesLog = [];
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('status-dot').className = '';
  document.getElementById('status-text').textContent = 'остановлен';
  document.getElementById('speed-value').textContent = '—';
  document.getElementById('speed-value').style.color = '#00d2aa';
  addLog('тест остановлен');
}

function resetStats() {
  history = []; sampleCount = 0; maxSpeed = 0; totalBytes = 0;
  document.getElementById('avg-val').textContent = '—';
  document.getElementById('max-val').textContent = '—';
  document.getElementById('samples-val').textContent = '0';
  chart.data.labels = []; chart.data.datasets[0].data = [];
  chart.update();
  document.getElementById('log').innerHTML = '';
  addLog('статистика сброшена');
}

function logMarker() { markerNext = true; addLog('⚑ маркер при следующем сэмпле', 'mark'); }

let currentIP = null;

const IP_PROVIDERS = [
  async () => {
    const d = await fetch('https://ipwho.is/', { cache: 'no-store' }).then(r => r.json());
    if (!d.success && d.success !== undefined) throw new Error('failed');
    return { ip: d.ip, country: d.country, flag: d.flag?.emoji || '', org: d.connection?.org || d.connection?.isp || '', city: d.city || '' };
  },
  async () => {
    const d = await fetch('https://ipapi.co/json/', { cache: 'no-store' }).then(r => r.json());
    if (d.error) throw new Error(d.reason);
    return { ip: d.ip, country: d.country_name, flag: d.country_flag_emoji || '', org: d.org || '', city: d.city || '' };
  },
  async () => {
    const d = await fetch('https://ipinfo.io/json', { cache: 'no-store' }).then(r => r.json());
    return { ip: d.ip, country: d.country, flag: '', org: d.org || '', city: d.city || '' };
  },
  async () => {
    const d = await fetch('https://ip-api.com/json/', { cache: 'no-store' }).then(r => r.json());
    if (d.status === 'fail') throw new Error('failed');
    return { ip: d.query, country: d.country, flag: '', org: d.isp || d.org || '', city: d.city || '' };
  },
];

let providerIndex = 0;

async function fetchIP() {
  const total = IP_PROVIDERS.length;
  for (let attempt = 0; attempt < total; attempt++) {
    const idx = (providerIndex + attempt) % total;
    try {
      const d = await IP_PROVIDERS[idx]();
      providerIndex = idx; // запомним работающий провайдер
      const newIP = d.ip;
      if (currentIP && currentIP !== newIP) {
        addLog(`⚑ IP: ${currentIP} → ${newIP} (${d.country}, ${d.org})`, 'mark');
        const el = document.getElementById('ip-addr');
        el.classList.remove('changed'); void el.offsetWidth; el.classList.add('changed');
        setTimeout(() => el.classList.remove('changed'), 2500);
      }
      currentIP = newIP;
      document.getElementById('ip-addr').textContent = newIP;
      document.getElementById('ip-country').textContent = (d.flag ? d.flag + ' ' : '') + (d.country || '—');
      document.getElementById('ip-org').textContent = (d.org || '—').replace(/^AS\d+\s*/, '');
      document.getElementById('ip-city').textContent = d.city || '—';
      document.getElementById('ip-status').textContent = 'обновлено ' + ts();
      return;
    } catch(e) {
      // этот провайдер не сработал, пробуем следующий
    }
  }
  // все упали
  document.getElementById('ip-status').textContent = 'ошибка всех IP API';
}
fetchIP();
setInterval(fetchIP, 5000);
</script>
</body>
</html>
